<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="0.55" stop-color="#5566F0"/>
      <stop offset="1" stop-color="#22A7FF"/>
    </linearGradient>
    <radialGradient id="hl" cx="0.3" cy="0.22" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="ds" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#13205c" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- gradient squircle -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#hl)"/>

  <!-- microphone -->
  <g filter="url(#ds)">
    <!-- head -->
    <rect x="412" y="270" width="200" height="310" rx="100" fill="#ffffff"/>
    <!-- cradle + stem + base -->
    <g fill="none" stroke="#ffffff" stroke-width="62" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 322 512 A 190 190 0 0 0 702 512"/>
      <path d="M 512 702 L 512 778"/>
      <path d="M 424 796 L 600 796"/>
    </g>
    <!-- AI sparkle -->
    <path d="M 716 300
             Q 728 360 786 372
             Q 728 384 716 444
             Q 704 384 646 372
             Q 704 360 716 300 Z"
          fill="#ffffff"/>
  </g>
</svg>
