name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Build and Test
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild build \
            -project AIHelper.xcodeproj \
            -scheme AIHelper \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Run Tests
        continue-on-error: true
        run: |
          # Check if scheme has test action configured
          if xcodebuild -project AIHelper.xcodeproj -scheme AIHelper -showBuildSettings 2>&1 | grep -q "TEST_HOST"; then
            xcodebuild test \
              -project AIHelper.xcodeproj \
              -scheme AIHelper \
              -destination 'platform=macOS' \
              -configuration Debug \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              -resultBundlePath TestResults.xcresult
          else
            echo "Test action not configured for scheme, skipping tests"
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7
